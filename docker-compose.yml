version: "3.9"

# OfferGPT 基础设施服务
# 启动: docker-compose up -d
# 停止: docker-compose down
# 清理数据: docker-compose down -v

services:
  postgres:
    image: postgres:16-alpine
    container_name: offergpt-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: offergpt
      POSTGRES_PASSWORD: offergpt123
      POSTGRES_DB: offergpt
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U offergpt"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: offergpt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
